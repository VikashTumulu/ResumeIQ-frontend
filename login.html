<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeIQ - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-decor" aria-hidden="true">
    <svg class="icon icon-doc" viewBox="0 0 100 120" fill="none">
      <rect x="10" y="5" width="80" height="110" rx="4" stroke="currentColor" stroke-width="2.5"/>
      <line x1="24" y1="30" x2="76" y2="30" stroke="currentColor" stroke-width="2.5"/>
      <line x1="24" y1="45" x2="76" y2="45" stroke="currentColor" stroke-width="2.5"/>
      <line x1="24" y1="60" x2="60" y2="60" stroke="currentColor" stroke-width="2.5"/>
      <line x1="24" y1="80" x2="70" y2="80" stroke="currentColor" stroke-width="2.5"/>
      <line x1="24" y1="93" x2="50" y2="93" stroke="currentColor" stroke-width="2.5"/>
    </svg>

    <svg class="icon icon-code" viewBox="0 0 120 60" fill="none">
      <path d="M35 10 L10 30 L35 50" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M85 10 L110 30 L85 50" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="68" y1="4" x2="52" y2="56" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>

    <svg class="icon icon-score" viewBox="0 0 100 70" fill="none">
      <rect x="5" y="40" width="16" height="25" fill="currentColor" opacity="0.6"/>
      <rect x="30" y="25" width="16" height="40" fill="currentColor" opacity="0.8"/>
      <rect x="55" y="10" width="16" height="55" fill="currentColor"/>
      <rect x="80" y="30" width="16" height="35" fill="currentColor" opacity="0.7"/>
    </svg>

    <svg class="icon icon-terminal" viewBox="0 0 100 60" fill="none">
      <rect x="2" y="2" width="96" height="56" rx="4" stroke="currentColor" stroke-width="2.5"/>
      <path d="M12 20 L26 30 L12 40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="32" y1="40" x2="55" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="scan-frame">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <div class="scan-line"></div>

    <div class="auth-container">
      <p class="eyebrow">RESUMEIQ // WELCOME_BACK</p>
      <h1>Log in</h1>
      <p class="subhead">Pick up where you left off.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">
          <span>Log in</span>
        </button>
      </form>

      <p id="errorMsg" class="error"></p>

      <p class="switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
